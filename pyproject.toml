[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "curik"
version = "0.1.0"
description = "Curriculum development tool scaffold for League infrastructure"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "League Infrastructure" }]

[project.scripts]
curik = "curik.cli:main"

[tool.setuptools]
packages = ["curik"]
